# nginx config for RadiantCare frontend container
# - Serves the React SPA on port 80
# - Proxies /api/* requests to the API container (radiantcare-api:8000)
# - Handles SPA client-side routing (returns index.html for unknown paths)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow large file uploads (X-ray images)
        client_max_body_size 20M;
    }

    # Serve static files; fall back to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
